<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do Álbum Virtual - Copa 2026</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #4a154b;
            --accent-owned: #2ecc71;
            --accent-repeated: #e67e22;
            --text-color: #2c3e50;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #631976, #3b0d4b);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .filters {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .team-section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .team-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-progress {
            font-size: 12px;
            color: #7f8c8d;
            background: #edf2f7;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .sticker-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            background: #fafafa;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 6px;
        }

        .sticker-id {
            font-weight: bold;
            font-size: 13px;
            word-break: break-word;
        }

        .action-btn {
            padding: 4px 8px;
            font-size: 11px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .btn-have {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        .sticker-card.owned .btn-have {
            background-color: var(--accent-owned);
            color: white;
        }

        .sticker-card.owned {
            background-color: #ebfbee;
            border-color: #a3e635;
        }

        .repeated-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
            font-size: 11px;
        }

        .rep-btn {
            background: #cbd5e1;
            border: none;
            width: 24px;
            height: 22px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rep-btn:hover {
            background: #94a3b8;
        }

        .rep-count {
            flex: 1;
            text-align: center;
            font-weight: bold;
        }

        .sticker-card.has-repeated {
            border-color: var(--accent-repeated);
        }
        
        .sticker-card.has-repeated .repeated-control {
            background-color: #ffedd5;
            color: #c2410c;
        }

        .actions-footer {
            margin-top: 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .footer-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            background-color: var(--primary-color);
            color: white;
        }

        .btn-danger {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>

    <header>
        <h1>Controle do Álbum Virtual - Copa 2026</h1>
        <p>Ajustado: Cada seleção contém apenas do número 0 ao 11 e seção Fan Stickers incluída.</p>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Total de Figurinhas</h3>
            <p id="stat-total-stickers">0</p>
        </div>
        <div class="stat-card">
            <h3>Tenho Coladas</h3>
            <p id="stat-owned">0 (<span id="stat-owned-pct">0%</span>)</p>
        </div>
        <div class="stat-card">
            <h3>Faltam</h3>
            <p id="stat-missing">0</p>
        </div>
        <div class="stat-card">
            <h3>Total de Repetidas</h3>
            <p id="stat-repeated">0</p>
        </div>
    </div>

    <div class="filters">
        <input type="text" id="search-input" class="search-bar" placeholder="Buscar seleção ou código da figurinha..." oninput="filterTeams()">
    </div>

    <div class="teams-container" id="teams-container"></div>

    <div class="actions-footer">
        <button class="footer-btn btn-danger" onclick="clearAllData()">Limpar Tudo</button>
    </div>

    <script>
        const albumData = [{"id": "FWC_TOP", "name": "Introdução", "stickers": ["0", "FWC1", "FWC2", "FWC3", "FWC4", "FWC5", "FWC6", "FWC7", "FWC8"]}, {"id": "MEX", "name": "México", "stickers": ["MEX0", "MEX1", "MEX2", "MEX3", "MEX4", "MEX5", "MEX6", "MEX7", "MEX8", "MEX9", "MEX10", "MEX11"]}, {"id": "RSA", "name": "África do Sul", "stickers": ["RSA0", "RSA1", "RSA2", "RSA3", "RSA4", "RSA5", "RSA6", "RSA7", "RSA8", "RSA9", "RSA10", "RSA11"]}, {"id": "KOR", "name": "Coreia do Sul", "stickers": ["KOR0", "KOR1", "KOR2", "KOR3", "KOR4", "KOR5", "KOR6", "KOR7", "KOR8", "KOR9", "KOR10", "KOR11"]}, {"id": "CZE", "name": "Chéquia", "stickers": ["CZE0", "CZE1", "CZE2", "CZE3", "CZE4", "CZE5", "CZE6", "CZE7", "CZE8", "CZE9", "CZE10", "CZE11"]}, {"id": "CAN", "name": "Canadá", "stickers": ["CAN0", "CAN1", "CAN2", "CAN3", "CAN4", "CAN5", "CAN6", "CAN7", "CAN8", "CAN9", "CAN10", "CAN11"]}, {"id": "BIH", "name": "Bósnia e Herzegovina", "stickers": ["BIH0", "BIH1", "BIH2", "BIH3", "BIH4", "BIH5", "BIH6", "BIH7", "BIH8", "BIH9", "BIH10", "BIH11"]}, {"id": "QAT", "name": "Catar", "stickers": ["QAT0", "QAT1", "QAT2", "QAT3", "QAT4", "QAT5", "QAT6", "QAT7", "QAT8", "QAT9", "QAT10", "QAT11"]}, {"id": "SUI", "name": "Suíça", "stickers": ["SUI0", "SUI1", "SUI2", "SUI3", "SUI4", "SUI5", "SUI6", "SUI7", "SUI8", "SUI9", "SUI10", "SUI11"]}, {"id": "BRA", "name": "Brasil", "stickers": ["BRA0", "BRA1", "BRA2", "BRA3", "BRA4", "BRA5", "BRA6", "BRA7", "BRA8", "BRA9", "BRA10", "BRA11"]}, {"id": "MAR", "name": "Marrocos", "stickers": ["MAR0", "MAR1", "MAR2", "MAR3", "MAR4", "MAR5", "MAR6", "MAR7", "MAR8", "MAR9", "MAR10", "MAR11"]}, {"id": "HAI", "name": "Haiti", "stickers": ["HAI0", "HAI1", "HAI2", "HAI3", "HAI4", "HAI5", "HAI6", "HAI7", "HAI8", "HAI9", "HAI10", "HAI11"]}, {"id": "SCO", "name": "Escócia", "stickers": ["SCO0", "SCO1", "SCO2", "SCO3", "SCO4", "SCO5", "SCO6", "SCO7", "SCO8", "SCO9", "SCO10", "SCO11"]}, {"id": "USA", "name": "Estados Unidos", "stickers": ["USA0", "USA1", "USA2", "USA3", "USA4", "USA5", "USA6", "USA7", "USA8", "USA9", "USA10", "USA11"]}, {"id": "PAR", "name": "Paraguai", "stickers": ["PAR0", "PAR1", "PAR2", "PAR3", "PAR4", "PAR5", "PAR6", "PAR7", "PAR8", "PAR9", "PAR10", "PAR11"]}, {"id": "AUS", "name": "Austrália", "stickers": ["AUS0", "AUS1", "AUS2", "AUS3", "AUS4", "AUS5", "AUS6", "AUS7", "AUS8", "AUS9", "AUS10", "AUS11"]}, {"id": "TUR", "name": "Turquia", "stickers": ["TUR0", "TUR1", "TUR2", "TUR3", "TUR4", "TUR5", "TUR6", "TUR7", "TUR8", "TUR9", "TUR10", "TUR11"]}, {"id": "GER", "name": "Alemanha", "stickers": ["GER0", "GER1", "GER2", "GER3", "GER4", "GER5", "GER6", "GER7", "GER8", "GER9", "GER10", "GER11"]}, {"id": "CUW", "name": "Curaçao", "stickers": ["CUW0", "CUW1", "CUW2", "CUW3", "CUW4", "CUW5", "CUW6", "CUW7", "CUW8", "CUW9", "CUW10", "CUW11"]}, {"id": "CIV", "name": "Costa do Marfim", "stickers": ["CIV0", "CIV1", "CIV2", "CIV3", "CIV4", "CIV5", "CIV6", "CIV7", "CIV8", "CIV9", "CIV10", "CIV11"]}, {"id": "ECU", "name": "Equador", "stickers": ["ECU0", "ECU1", "ECU2", "ECU3", "ECU4", "ECU5", "ECU6", "ECU7", "ECU8", "ECU9", "ECU10", "ECU11"]}, {"id": "NED", "name": "Países Baixos", "stickers": ["NED0", "NED1", "NED2", "NED3", "NED4", "NED5", "NED6", "NED7", "NED8", "NED9", "NED10", "NED11"]}, {"id": "JPN", "name": "Japão", "stickers": ["JPN0", "JPN1", "JPN2", "JPN3", "JPN4", "JPN5", "JPN6", "JPN7", "JPN8", "JPN9", "JPN10", "JPN11"]}, {"id": "SWE", "name": "Suécia", "stickers": ["SWE0", "SWE1", "SWE2", "SWE3", "SWE4", "SWE5", "SWE6", "SWE7", "SWE8", "SWE9", "SWE10", "SWE11"]}, {"id": "TUN", "name": "Tunísia", "stickers": ["TUN0", "TUN1", "TUN2", "TUN3", "TUN4", "TUN5", "TUN6", "TUN7", "TUN8", "TUN9", "TUN10", "TUN11"]}, {"id": "BEL", "name": "Bélgica", "stickers": ["BEL0", "BEL1", "BEL2", "BEL3", "BEL4", "BEL5", "BEL6", "BEL7", "BEL8", "BEL9", "BEL10", "BEL11"]}, {"id": "EGY", "name": "Egito", "stickers": ["EGY0", "EGY1", "EGY2", "EGY3", "EGY4", "EGY5", "EGY6", "EGY7", "EGY8", "EGY9", "EGY10", "EGY11"]}, {"id": "IRN", "name": "Irã", "stickers": ["IRN0", "IRN1", "IRN2", "IRN3", "IRN4", "IRN5", "IRN6", "IRN7", "IRN8", "IRN9", "IRN10", "IRN11"]}, {"id": "NZL", "name": "Nova Zelândia", "stickers": ["NZL0", "NZL1", "NZL2", "NZL3", "NZL4", "NZL5", "NZL6", "NZL7", "NZL8", "NZL9", "NZL10", "NZL11"]}, {"id": "ESP", "name": "Espanha", "stickers": ["ESP0", "ESP1", "ESP2", "ESP3", "ESP4", "ESP5", "ESP6", "ESP7", "ESP8", "ESP9", "ESP10", "ESP11"]}, {"id": "CPV", "name": "Cabo Verde", "stickers": ["CPV0", "CPV1", "CPV2", "CPV3", "CPV4", "CPV5", "CPV6", "CPV7", "CPV8", "CPV9", "CPV10", "CPV11"]}, {"id": "KSA", "name": "Arábia Saudita", "stickers": ["KSA0", "KSA1", "KSA2", "KSA3", "KSA4", "KSA5", "KSA6", "KSA7", "KSA8", "KSA9", "KSA10", "KSA11"]}, {"id": "URU", "name": "Uruguai", "stickers": ["URU0", "URU1", "URU2", "URU3", "URU4", "URU5", "URU6", "URU7", "URU8", "URU9", "URU10", "URU11"]}, {"id": "FRA", "name": "França", "stickers": ["FRA0", "FRA1", "FRA2", "FRA3", "FRA4", "FRA5", "FRA6", "FRA7", "FRA8", "FRA9", "FRA10", "FRA11"]}, {"id": "SEN", "name": "Senegal", "stickers": ["SEN0", "SEN1", "SEN2", "SEN3", "SEN4", "SEN5", "SEN6", "SEN7", "SEN8", "SEN9", "SEN10", "SEN11"]}, {"id": "IRQ", "name": "Iraque", "stickers": ["IRQ0", "IRQ1", "IRQ2", "IRQ3", "IRQ4", "IRQ5", "IRQ6", "IRQ7", "IRQ8", "IRQ9", "IRQ10", "IRQ11"]}, {"id": "NOR", "name": "Noruega", "stickers": ["NOR0", "NOR1", "NOR2", "NOR3", "NOR4", "NOR5", "NOR6", "NOR7", "NOR8", "NOR9", "NOR10", "NOR11"]}, {"id": "ARG", "name": "Argentina", "stickers": ["ARG0", "ARG1", "ARG2", "ARG3", "ARG4", "ARG5", "ARG6", "ARG7", "ARG8", "ARG9", "ARG10", "ARG11"]}, {"id": "ALG", "name": "Argélia", "stickers": ["ALG0", "ALG1", "ALG2", "ALG3", "ALG4", "ALG5", "ALG6", "ALG7", "ALG8", "ALG9", "ALG10", "ALG11"]}, {"id": "AUT", "name": "Áustria", "stickers": ["AUT0", "AUT1", "AUT2", "AUT3", "AUT4", "AUT5", "AUT6", "AUT7", "AUT8", "AUT9", "AUT10", "AUT11"]}, {"id": "JOR", "name": "Jordânia", "stickers": ["JOR0", "JOR1", "JOR2", "JOR3", "JOR4", "JOR5", "JOR6", "JOR7", "JOR8", "JOR9", "JOR10", "JOR11"]}, {"id": "POR", "name": "Portugal", "stickers": ["POR0", "POR1", "POR2", "POR3", "POR4", "POR5", "POR6", "POR7", "POR8", "POR9", "POR10", "POR11"]}, {"id": "COD", "name": "RD Congo", "stickers": ["COD0", "COD1", "COD2", "COD3", "COD4", "COD5", "COD6", "COD7", "COD8", "COD9", "COD10", "COD11"]}, {"id": "UZB", "name": "Uzbequistão", "stickers": ["UZB0", "UZB1", "UZB2", "UZB3", "UZB4", "UZB5", "UZB6", "UZB7", "UZB8", "UZB9", "UZB10", "UZB11"]}, {"id": "COL", "name": "Colômbia", "stickers": ["COL0", "COL1", "COL2", "COL3", "COL4", "COL5", "COL6", "COL7", "COL8", "COL9", "COL10", "COL11"]}, {"id": "ENG", "name": "Inglaterra", "stickers": ["ENG0", "ENG1", "ENG2", "ENG3", "ENG4", "ENG5", "ENG6", "ENG7", "ENG8", "ENG9", "ENG10", "ENG11"]}, {"id": "CRO", "name": "Croácia", "stickers": ["CRO0", "CRO1", "CRO2", "CRO3", "CRO4", "CRO5", "CRO6", "CRO7", "CRO8", "CRO9", "CRO10", "CRO11"]}, {"id": "GHA", "name": "Gana", "stickers": ["GHA0", "GHA1", "GHA2", "GHA3", "GHA4", "GHA5", "GHA6", "GHA7", "GHA8", "GHA9", "GHA10", "GHA11"]}, {"id": "PAN", "name": "Panamá", "stickers": ["PAN0", "PAN1", "PAN2", "PAN3", "PAN4", "PAN5", "PAN6", "PAN7", "PAN8", "PAN9", "PAN10", "PAN11"]}, {"id": "CC", "name": "Coca-Cola (CC1-CC14)", "stickers": ["CC1", "CC2", "CC3", "CC4", "CC5", "CC6", "CC7", "CC8", "CC9", "CC10", "CC11", "CC12", "CC13", "CC14"]}, {"id": "HOST", "name": "Cidades-Sede", "stickers": ["Philadelphia", "Houston", "Atlanta", "Mexico City", "Los Angeles", "Kansas City", "Dallas", "Boston", "Miami", "Monterrey", "Vancouver", "Seattle", "Toronto", "New York/New Jersey", "San Francisco Bay Area", "Guadalajara"]}];

        // Gera a seção "Fan Stickers" dinamicamente com base nas seleções existentes no albumData
        const fanStickersList = albumData
            .filter(team => team.id !== 'FWC_TOP' && team.id !== 'CC' && team.id !== 'HOST')
            .map(team => `FAN-${team.id}`);

        albumData.push({
            "id": "FAN",
            "name": "Fan Stickers",
            "stickers": fanStickersList
        });

        // Carrega dados do LocalStorage ou inicia vazio
        let userProgress = JSON.parse(localStorage.getItem('cup2026_virtual_progress')) || {};

        function initApp() {
            renderAlbum();
            updateStats();
        }

        function renderAlbum() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            albumData.forEach(team => {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-section';
                teamSection.setAttribute('data-team-id', team.id);
                teamSection.setAttribute('data-team-name', team.name.toLowerCase());

                let ownedInTeam = 0;
                team.stickers.forEach(id => {
                    if (userProgress[id] && userProgress[id].owned) ownedInTeam++;
                });

                teamSection.innerHTML = `
                    <div class="team-header">
                        <span>${team.name}</span>
                        <span class="team-progress" id="progress-${team.id}">${ownedInTeam} / ${team.stickers.length}</span>
                    </div>
                    <div class="stickers-grid">
                        ${team.stickers.map(id => {
                            const isOwned = userProgress[id]?.owned || false;
                            const repCount = userProgress[id]?.repeated || 0;
                            const cardClass = `${isOwned ? 'owned' : ''} ${repCount > 0 ? 'has-repeated' : ''}`;
                            
                            return `
                                <div class="sticker-card ${cardClass}" id="card-${id}">
                                    <div class="sticker-id">${id}</div>
                                    <button class="action-btn btn-have" onclick="toggleOwned('${id}', '${team.id}', ${team.stickers.length})">
                                        ${isOwned ? 'Tenho' : 'Colar'}
                                    </button>
                                    <div class="repeated-control">
                                        <button class="rep-btn" onclick="changeRepeated('${id}', -1)">-</button>
                                        <span class="rep-count" id="rep-${id}">${repCount}</span>
                                        <button class="rep-btn" onclick="changeRepeated('${id}', 1)">+</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(teamSection);
            });
        }

        function toggleOwned(id, teamId, totalTeamStickers) {
            if (!userProgress[id]) {
                userProgress[id] = { owned: false, repeated: 0 };
            }
            userProgress[id].owned = !userProgress[id].owned;
            
            const card = document.getElementById(`card-${id}`);
            const btn = card.querySelector('.btn-have');
            
            if (userProgress[id].owned) {
                card.classList.add('owned');
                btn.innerText = 'Tenho';
            } else {
                card.classList.remove('owned');
                btn.innerText = 'Colar';
            }

            saveData();
            updateTeamProgress(teamId);
            updateStats();
        }

        function changeRepeated(id, amount) {
            if (!userProgress[id]) {
                userProgress[id] = { owned: false, repeated: 0 };
            }
            
            userProgress[id].repeated = Math.max(0, (userProgress[id].repeated || 0) + amount);
            
            const card = document.getElementById(`card-${id}`);
            const repLabel = document.getElementById(`rep-${id}`);
            repLabel.innerText = userProgress[id].repeated;

            if (userProgress[id].repeated > 0) {
                card.classList.add('has-repeated');
            } else {
                card.classList.remove('has-repeated');
            }

            saveData();
            updateStats();
        }

        function updateTeamProgress(teamId) {
            const team = albumData.find(t => t.id === teamId);
            let owned = 0;
            team.stickers.forEach(id => {
                if (userProgress[id] && userProgress[id].owned) owned++;
            });
            document.getElementById(`progress-${teamId}`).innerText = `${owned} / ${team.stickers.length}`;
        }

        function updateStats() {
            let totalStickers = 0;
            let totalOwned = 0;
            let totalRepeated = 0;

            albumData.forEach(team => {
                totalStickers += team.stickers.length;
                team.stickers.forEach(id => {
                    if (userProgress[id]) {
                        if (userProgress[id].owned) totalOwned++;
                        totalRepeated += (userProgress[id].repeated || 0);
                    }
                });
            });

            const missing = totalStickers - totalOwned;
            const pct = totalStickers > 0 ? Math.round((totalOwned / totalStickers) * 100) : 0;

            document.getElementById('stat-total-stickers').innerText = totalStickers;
            document.getElementById('stat-owned').innerHTML = `${totalOwned} (<span id="stat-owned-pct">${pct}%</span>)`;
            document.getElementById('stat-missing').innerText = missing;
            document.getElementById('stat-repeated').innerText = totalRepeated;
        }

        function filterTeams() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sections = document.querySelectorAll('.team-section');

            sections.forEach(section => {
                const name = section.getAttribute('data-team-name');
                const id = section.getAttribute('data-team-id').toLowerCase();
                
                if (name.includes(query) || id.includes(query)) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        function saveData() {
            localStorage.setItem('cup2026_virtual_progress', JSON.stringify(userProgress));
        }

        function clearAllData() {
            if (confirm('Tem certeza que deseja apagar todo o seu progresso?')) {
                userProgress = {};
                saveData();
                initApp();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
