<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do Álbum Virtual - Copa 2026</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #8a1538;
            --accent-owned: #2ecc71;
            --accent-repeated: #e67e22;
            --text-color: #2c3e50;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #8a1538, #4a0014);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .owner-input-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .owner-input-container label {
            font-size: 14px;
            font-weight: bold;
        }

        .owner-input {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            width: 200px;
        }

        .owner-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        /* Elemento invisível na tela, mas que aparece no topo do PDF impresso */
        .print-header {
            display: none;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 3;
            min-width: 300px;
        }

        .filter-btn {
            padding: 10px 15px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #ffffff;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
        }

        .pdf-btn {
            background-color: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        .pdf-btn:hover {
            background-color: #2b6cb0;
        }

        .pdf-btn-compact {
            background-color: #4a5568;
            color: white;
            border-color: #4a5568;
        }

        .pdf-btn-compact:hover {
            background-color: #2d3748;
        }

        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .team-section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .team-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-progress {
            font-size: 12px;
            color: #7f8c8d;
            background: #edf2f7;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        .sticker-card {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            background: #fafafa;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 6px;
        }

        .sticker-id {
            font-weight: bold;
            font-size: 12px;
            color: #34495e;
        }

        .sticker-name {
            font-size: 11px;
            color: #7f8c8d;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .action-btn {
            padding: 5px 8px;
            font-size: 11px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .btn-have {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        .sticker-card.owned .btn-have {
            background-color: var(--accent-owned);
            color: white;
        }

        .sticker-card.owned {
            background-color: #ebfbee;
            border-color: #a3e635;
        }

        .repeated-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
            font-size: 11px;
        }

        .rep-btn {
            background: #cbd5e1;
            border: none;
            width: 24px;
            height: 22px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rep-btn:hover {
            background: #94a3b8;
        }

        .rep-count {
            flex: 1;
            text-align: center;
            font-weight: bold;
        }

        .sticker-card.has-repeated {
            border-color: var(--accent-repeated);
        }
        
        .sticker-card.has-repeated .repeated-control {
            background-color: #ffedd5;
            color: #c2410c;
        }

        .actions-footer {
            margin-top: 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .footer-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            background-color: var(--primary-color);
            color: white;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        /* --- CLASSE AUXILIAR PARA O MODO COMPACTO DE IMPRESSÃO --- */
        body.compact-print-mode .sticker-name,
        body.compact-print-mode .action-btn,
        body.compact-print-mode .repeated-control {
            display: none !important;
        }
        
        body.compact-print-mode .stickers-grid {
            grid-template-columns: repeat(16, 1fr) !important;
            gap: 3px !important;
        }

        body.compact-print-mode .sticker-card {
            padding: 3px !important;
            min-height: unset !important;
            font-size: 10px !important;
        }

        body.compact-print-mode .team-section {
            margin-bottom: 5px !important;
            padding: 8px !important;
        }

        body.compact-print-mode .team-header {
            margin-bottom: 5px !important;
            font-size: 12px !important;
        }

        /* --- ESTILOS DE IMPRESSÃO GERAIS --- */
        @media print {
            body {
                background: white;
                color: black;
                padding: 0;
            }
            header, .dashboard, .controls-row, .actions-footer, .action-btn, .repeated-control {
                display: none !important;
            }
            .print-header {
                display: block !important;
            }
            .team-section {
                box-shadow: none !important;
                border: 1px solid #cbd5e1 !important;
                page-break-inside: avoid;
                margin-bottom: 15px;
            }
            .stickers-grid {
                grid-template-columns: repeat(8, 1fr);
                gap: 5px !important;
            }
            .sticker-card {
                background: white !important;
                border: 1px solid #cbd5e1 !important;
                padding: 5px !important;
            }
            .sticker-card.owned {
                background-color: #f0fdf4 !important;
            }
            .sticker-card.has-repeated {
                border-color: #f97316 !important;
            }
            
            /* Ajustes estritos para forçar o simplificado a caber em 1 página */
            body.compact-print-mode .stickers-grid {
                grid-template-columns: repeat(18, 1fr) !important;
            }
            body.compact-print-mode .team-section {
                page-break-inside: auto !important;
            }
        }
    </style>
</head>

    </div>

    <div class="teams-container" id="teams-container"></div>

    <div class="actions-footer">
        <button class="footer-btn btn-danger" onclick="clearAllData()">Limpar Tudo</button>

            "GHA": ["Lawrence Ati Zigi", "Alidu Seidu", "Alexander Djiku", "Gideon Mensah", "Caleb Yirenkyi", "Thomas Partey", "Abdul Fatawu Issahaku", "Mohammed Kudus", "Kamaldeen Sulemana", "Jordan Ayew", "Antoine Semenyo"],
            "PAN": ["Orlando Mosquera", "Michael Amir Murillo", "Andrés Andrade", "Fidel Escobar", "Aníbal Godoy", "Cristian Martínez", "Adalberto Carrasquilla", "Édgar Bárcenas", "José Fajardo", "Ismael Díaz", "José Luis Rodríguez"]
        };

        const teamMetadata = [
            {"id": "MEX", "name": "México"}, {"id": "RSA", "name": "África do Sul"}, {"id": "KOR", "name": "Coreia do Sul"}, {"id": "CZE", "name": "Chéquia"},
            {"id": "CAN", "name": "Canadá"}, {"id": "BIH", "name": "Bósnia e Herzegovina"}, {"id": "QAT", "name": "Catar"}, {"id": "SUI", "name": "Suíça"},
            {"id": "BRA", "name": "Brasil"}, {"id": "MAR", "name": "Marrocos"}, {"id": "HAI", "name": "Haiti"}, {"id": "SCO", "name": "Escócia"},
            {"id": "USA", "name": "Estados Unidos"}, {"id": "PAR", "name": "Paraguai"}, {"id": "AUS", "name": "Austrália"}, {"id": "TUR", "name": "Turquia"},
            {"id": "GER", "name": "Alemanha"}, {"id": "CUW", "name": "Curaçao"}, {"id": "CIV", "name": "Costa do Marfim"}, {"id": "ECU", "name": "Equador"},
            {"id": "NED", "name": "Países Baixos"}, {"id": "JPN", "name": "Japão"}, {"id": "SWE", "name": "Suécia"}, {"id": "TUN", "name": "Tunísia"},
            {"id": "BEL", "name": "Bélgica"}, {"id": "EGY", "name": "Egito"}, {"id": "IRN", "name": "Irã"}, {"id": "NZL", "name": "Nova Zelândia"},
            {"id": "ESP", "name": "Espanha"}, {"id": "CPV", "name": "Cabo Verde"}, {"id": "KSA", "name": "Arábia Saudita"}, {"id": "URU", "name": "Uruguai"},
            {"id": "FRA", "name": "França"}, {"id": "SEN", "name": "Senegal"}, {"id": "IRQ", "name": "Iraque"}, {"id": "NOR", "name": "Noruega"},
            {"id": "ARG", "name": "Argentina"}, {"id": "ALG", "name": "Argélia"}, {"id": "AUT", "name": "Áustria"}, {"id": "JOR", "name": "Jordânia"},
            {"id": "POR", "name": "Portugal"}, {"id": "COD", "name": "RD Congo"}, {"id": "UZB", "name": "Uzbequistão"}, {"id": "COL", "name": "Colômbia"},
            {"id": "ENG", "name": "Inglaterra"}, {"id": "CRO", "name": "Croácia"}, {"id": "GHA", "name": "Gana"}, {"id": "PAN", "name": "Panamá"}
        ];

        const cocaColaPlayers = [
            "Lamine Yamal", "Joshua Kimmich", "Harry Kane", "Santiago Gimenez", 
            "Josko Gvardiol", "Federico Valverde", "Jefferson Lerma", "Enner Valencia", 
            "Gabriel Magalhaes", "Virgil Van Dijk", "Alphonso Davies", "Emiliano Martinez", 
            "Raul Jimenez", "Lautaro Martinez"
        ];

        const albumData = [];
        let currentFilter = 'all';

        // Inicialização de Seções Especiais
        albumData.push({
            "id": "INI", "name": "Página Inicial",
            "stickers": [
                {"code": "00", "name": "PANINI"}, {"code": "FWC1", "name": "Taça 1/2"}, {"code": "FWC2", "name": "Taça 2/2"},
                {"code": "FWC3", "name": "Mascotes Oficiais"}, {"code": "FWC4", "name": "Slogan Oficial"}, {"code": "FWC5", "name": "Bola Oficial"},
                {"code": "FWC6", "name": "Emblema CAN"}, {"code": "FWC7", "name": "Emblema MEX"}, {"code": "FWC8", "name": "Emblema USA"}
            ]
        });

        albumData.push({
            "id": "HIS", "name": "FIFA World Cup History",
            "stickers": Array.from({length: 11}, (_, i) => ({ "code": `FWC${i+9}`, "name": `FWC ${i+9}` }))
        });

        // Loop de montagem das seleções
        teamMetadata.forEach(team => {
            const stickers = [];
            const playersList = rawPlayersData[team.id] || [];
            let playerIndex = 0;

            for (let i = 1; i <= 20; i++) {
                let description = "";
                if (i === 1) description = "Emblema";
                else if (i === 13) description = "Equipe Completa";
                else {
                    description = playersList[playerIndex] || `Jogador ${i}`;
                    playerIndex++;
                }
                stickers.push({ "code": `${team.id}${i}`, "name": description });
            }
            albumData.push({ "id": team.id, "name": team.name, "stickers": stickers });
        });

        albumData.push({
            "id": "COC", "name": "Coca-Cola",
            "stickers": cocaColaPlayers.map((player, index) => ({ "code": `CC${index+1}`, "name": player }))
        });

        let userProgress = JSON.parse(localStorage.getItem('cup2026_physical_album_progress')) || {};

        function initApp() {
            // Carrega o nome do colecionador se houver salvo
            const savedOwner = localStorage.getItem('cup2026_album_owner') || "";
            document.getElementById('owner-name').value = savedOwner;
            updatePrintHeader(savedOwner);

            renderAlbum();
            updateStats();
            filterAndApply();
        }

        function saveOwnerName() {
            const name = document.getElementById('owner-name').value;
            localStorage.setItem('cup2026_album_owner', name);
            updatePrintHeader(name);
        }

        function updatePrintHeader(name) {
            const formattedName = name.trim() ? name : "Não Informado";
            let statusText = "Lista Geral";
            if (currentFilter === 'owned') statusText = "Apenas Figurinhas Coladas";
            if (currentFilter === 'missing') statusText = "Apenas Figurinhas Faltantes";
            if (currentFilter === 'repeated') statusText = "Apenas Figurinhas Repetidas";

            document.getElementById('print-header-element').innerText = 
                `Controle do Álbum Copa 2026 — Cenário: ${statusText} (Proprietário: ${formattedName})`;
        }

        function renderAlbum() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            albumData.forEach(team => {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-section';
                teamSection.setAttribute('data-team-id', team.id);
                teamSection.setAttribute('data-team-name', team.name.toLowerCase());

                let ownedInTeam = 0;
                team.stickers.forEach(st => {
                    if (userProgress[st.code] && userProgress[st.code].owned) ownedInTeam++;
                });

                teamSection.innerHTML = `
                    <div class="team-header">
                        <span>${team.name} ${team.id.length === 3 && !['INI', 'HIS', 'COC'].includes(team.id) ? `(${team.id})` : ''}</span>
                        <span class="team-progress" id="progress-${team.id}">${ownedInTeam} / ${team.stickers.length}</span>
                    </div>
                    <div class="stickers-grid">
                        ${team.stickers.map(st => {
                            const isOwned = userProgress[st.code]?.owned || false;
                            const repCount = userProgress[st.code]?.repeated || 0;
                            const cardClass = `${isOwned ? 'owned' : ''} ${repCount > 0 ? 'has-repeated' : ''}`;
                            
                            return `
                                <div class="sticker-card ${cardClass}" id="card-${st.code}" data-search="${st.name.toLowerCase()}" data-owned="${isOwned}" data-repeated="${repCount}">
                                    <div class="sticker-id">${st.code}</div>
                                    <div class="sticker-name">${st.name}</div>
                                    <button class="action-btn btn-have" onclick="toggleOwned('${st.code}', '${team.id}')">
                                        ${isOwned ? 'Tenho' : 'Colar'}
                                    </button>
                                    <div class="repeated-control">
                                        <button class="rep-btn" onclick="changeRepeated('${st.code}', -1)">-</button>
                                        <span class="rep-count" id="rep-${st.code}">${repCount}</span>
                                        <button class="rep-btn" onclick="changeRepeated('${st.code}', 1)">+</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(teamSection);
            });
        }

        function toggleOwned(code, teamId) {
            if (!userProgress[code]) userProgress[code] = { owned: false, repeated: 0 };
            userProgress[code].owned = !userProgress[code].owned;
            
            const card = document.getElementById(`card-${code}`);
            const btn = card.querySelector('.btn-have');
            
            if (userProgress[code].owned) {
                card.classList.add('owned');
                card.setAttribute('data-owned', 'true');
                btn.innerText = 'Tenho';
            } else {
                card.classList.remove('owned');
                card.setAttribute('data-owned', 'false');
                btn.innerText = 'Colar';
            }

            saveData();
            updateTeamProgress(teamId);
            updateStats();
            filterAndApply();
        }

        function changeRepeated(code, amount) {
            if (!userProgress[code]) userProgress[code] = { owned: false, repeated: 0 };
            userProgress[code].repeated = Math.max(0, (userProgress[code].repeated || 0) + amount);
            
            const card = document.getElementById(`card-${code}`);
            const repLabel = document.getElementById(`rep-${code}`);
            repLabel.innerText = userProgress[code].repeated;
            card.setAttribute('data-repeated', userProgress[code].repeated);

            if (userProgress[code].repeated > 0) card.classList.add('has-repeated');
            else card.classList.remove('has-repeated');

            saveData();
            updateStats();
            filterAndApply();
        }

        function updateTeamProgress(teamId) {
            const team = albumData.find(t => t.id === teamId);
            let owned = 0;
            team.stickers.forEach(st => {
                if (userProgress[st.code] && userProgress[st.code].owned) owned++;
            });
            document.getElementById(`progress-${teamId}`).innerText = `${owned} / ${team.stickers.length}`;
        }

        function updateStats() {
            let totalStickers = 0;
            let totalOwned = 0;
            let totalRepeated = 0;

            albumData.forEach(team => {
                totalStickers += team.stickers.length;
                team.stickers.forEach(st => {
                    if (userProgress[st.code]) {
                        if (userProgress[st.code].owned) totalOwned++;
                        totalRepeated += (userProgress[st.code].repeated || 0);
                    }
                });
            });

            const missing = totalStickers - totalOwned;
            const pct = totalStickers > 0 ? Math.round((totalOwned / totalStickers) * 100) : 0;

            document.getElementById('stat-total-stickers').innerText = totalStickers;
            document.getElementById('stat-owned').innerHTML = `${totalOwned} (<span id="stat-owned-pct">${pct}%</span>)`;
            document.getElementById('stat-missing').innerText = missing;
            document.getElementById('stat-repeated').innerText = totalRepeated;
        }

        function setStickerFilter(filterType) {
            currentFilter = filterType;
            
            document.querySelectorAll('.filter-group .filter-btn').forEach(btn => {
                if(btn.id === `filter-${filterType}`) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            const currentOwner = document.getElementById('owner-name').value;
            updatePrintHeader(currentOwner);
            filterAndApply();
        }

        function filterAndApply() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sections = document.querySelectorAll('.team-section');

            sections.forEach(section => {
                const teamName = section.getAttribute('data-team-name');
                const teamId = section.getAttribute('data-team-id').toLowerCase();
                const cards = section.querySelectorAll('.sticker-card');
                
                let teamMatchesSearch = teamName.includes(query) || teamId.includes(query);
                let visibleCardsInSection = 0;

                cards.forEach(card => {
                    const cardId = card.id.replace('card-', '').toLowerCase();
                    const playerName = card.getAttribute('data-search');
                    const isOwned = card.getAttribute('data-owned') === 'true';
                    const repCount = parseInt(card.getAttribute('data-repeated') || '0', 10);

                    let textMatches = cardId.includes(query) || playerName.includes(query) || teamMatchesSearch;
                    
                    let conditionMatches = false;
                    if (currentFilter === 'all') conditionMatches = true;
                    else if (currentFilter === 'owned' && isOwned) conditionMatches = true;
                    else if (currentFilter === 'missing' && !isOwned) conditionMatches = true;
                    else if (currentFilter === 'repeated' && repCount > 0) conditionMatches = true;

                    if (textMatches && conditionMatches) {
                        card.style.display = 'flex';
                        visibleCardsInSection++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if (visibleCardsInSection > 0) section.style.display = 'block';
                else section.style.display = 'none';
            });
        }

        function generatePDF(isCompact) {
            if (isCompact) {
                // Adiciona classe de renderização super compacta apenas com os códigos das figurinhas
                document.body.classList.add('compact-print-mode');
                
                // Dispara a impressão nativa
                window.print();
                
                // Remove logo em seguida para que a tela do usuário volte ao normal
                setTimeout(() => {
                    document.body.classList.remove('compact-print-mode');
                }, 500);
            } else {
                window.print();
            }
        }

        function saveData() {
            localStorage.setItem('cup2026_physical_album_progress', JSON.stringify(userProgress));
        }

        function clearAllData() {
            if (confirm('Tem certeza que deseja zerar o progresso do seu Álbum Físico?')) {
                userProgress = {};
                saveData();
                initApp();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
